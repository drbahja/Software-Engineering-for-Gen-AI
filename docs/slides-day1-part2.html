<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 1 · Part 2 Slides — AI Lifecycle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .bar { display: flex; align-items: center; gap: 16px; padding: 10px 16px; background: #1e293b; color: #e2e8f0; flex-wrap: wrap; }
  .bar a { color: #7dd3fc; text-decoration: none; font-size: 14px; font-weight: 600; }
  .bar a:hover { text-decoration: underline; }
  .bar .counter { margin-left: auto; font-size: 14px; color: #94a3b8; }
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; }
  .stage img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .nav { position: absolute; top: 0; bottom: 0; width: 40%; cursor: pointer; }
  .nav.prev { left: 0; }
  .nav.next { right: 0; }
  .hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); color: #64748b; font-size: 12px; background: rgba(15,23,42,.7); padding: 4px 12px; border-radius: 999px; }
  .btn { background: #334155; border: none; color: #e2e8f0; padding: 6px 14px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .btn:hover { background: #475569; }
</style>
</head>
<body>

<div class="bar">
  <a href="index.html">← Course Home</a>
  <a href="slides-day1.html">← Part 1 slides</a>
  <strong>Day 1 · Part 2 — The AI Lifecycle</strong>
  <a href="slides/day1p2/Day1-Part2-Slides.pdf" download>⬇ PDF</a>
  <button class="btn" onclick="goFull()">⛶ Fullscreen</button>
  <span class="counter"><span id="cur">1</span> / <span id="total">28</span></span>
</div>

<div class="stage">
  <img id="slide" src="slides/day1p2/s-01.jpg" alt="Slide">
  <div class="nav prev" onclick="step(-1)" title="Previous (←)"></div>
  <div class="nav next" onclick="step(1)" title="Next (→ or space)"></div>
  <div class="hint" id="hint">← → arrow keys · click left/right side · F for fullscreen</div>
</div>

<script>
  const TOTAL = 28;
  let i = 1;
  const img = document.getElementById("slide");
  const cur = document.getElementById("cur");
  document.getElementById("total").textContent = TOTAL;

  const src = n => "slides/day1p2/s-" + String(n).padStart(2, "0") + ".jpg";
  function show(n) {
    i = Math.min(TOTAL, Math.max(1, n));
    img.src = src(i);
    cur.textContent = i;
    if (i < TOTAL) (new Image()).src = src(i + 1);
    if (i > 1) (new Image()).src = src(i - 1);
    location.hash = i;
  }
  const step = d => show(i + d);

  document.addEventListener("keydown", e => {
    if (["ArrowRight", " ", "PageDown"].includes(e.key)) { e.preventDefault(); step(1); }
    if (["ArrowLeft", "PageUp"].includes(e.key)) { e.preventDefault(); step(-1); }
    if (e.key === "Home") show(1);
    if (e.key === "End") show(TOTAL);
    if (e.key.toLowerCase() === "f") goFull();
  });

  let x0 = null;
  document.addEventListener("touchstart", e => x0 = e.touches[0].clientX);
  document.addEventListener("touchend", e => {
    if (x0 === null) return;
    const dx = e.changedTouches[0].clientX - x0;
    if (Math.abs(dx) > 40) step(dx < 0 ? 1 : -1);
    x0 = null;
  });

  function goFull() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }

  setTimeout(() => document.getElementById("hint").style.display = "none", 6000);
  if (location.hash) show(parseInt(location.hash.slice(1)) || 1);
</script>

</body>
</html>
